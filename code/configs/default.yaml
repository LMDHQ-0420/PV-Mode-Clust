# 主方法默认超参 —— 天气区制感知 + NWP 误差订正的软门控多专家光伏日前预测
# 每个消融开关都直通一个变体（见 configs/ablation/）；只覆盖相关项即可。

seed: 0                      # 单次运行种子；多种子由 train.seeds 驱动

data:
  raw_dir: dataset                  # 原始 PVOD（station*.csv + metadata.csv）
  processed_dir: data/processed     # 预处理缓存（gitignored）
  look_back: 192                    # 回看 2 天（96 点/天 × 2）；敏感性附 384，Part3 §0.7
  horizon: 96                       # 日前 1 天（15min × 96）
  split: [0.7, 0.1, 0.2]            # 时间顺序 train/val/test
  stations: [station00, station01, station02, station03, station04,
             station05, station06, station07, station08, station09]

fcm:                          # 模块 A：FCM 软天气区制
  K: 3                        # 区制数（消融 G 扫 2-5）
  m: 2.0                      # 模糊度 η
  feature_cols: [nwp_globalirrad, nwp_temperature, nwp_humidity]  # 仅 NWP 侧（推理可得）
  error: 0.005
  maxiter: 1000

vmd:                          # 仅消融 H（全序列 VMD 泄漏演示）使用
  K_modes: 5
  alpha: 2000
  tau: 0.0
  DC: 0
  init: 1
  tol: 1.0e-7

model:                        # 可学习软门控异质 MoE
  expert_types: [local_conv, dilated_tcn, direct_mlp]  # 异质专家（以未来NWP为主序列）
  expert_hidden: 128
  short_window: 48
  corrector_hidden: 128
  gate_mode: soft             # soft / hard（消融 B）
  learnable_gate: true        # FCM先验+可学习残差；消融 C 关
  gate_hidden: 64
  single_expert: false        # 消融 E（K=1）
  use_corrector: true         # 消融 F 关
  irrad_anchor: false         # 辐照锚定物理头（实证有害，默认关；消融 I 开作对照）
  leak_vmd: false             # 消融 H 开（全序列 VMD 泄漏演示）

corrector:                    # 自适应辐照订正
  beta: 0.01                  # 订正量幅度惩罚 β(γΔ)²
  big_err_quantile: 0.6       # 大误差区阈值分位（train 段白天辐照误差）

loss:
  lambda_corr: 0.1            # 订正辅助损失权重 L=L_pred+λL_corr
  huber_delta: 0.0            # >0 用 Huber（鲁棒），0=MSE

train:
  lr: 3.0e-3                  # Adam（调参定：高 LR + cosine 更优）
  batch_size: 64
  patience: 20                # 早停
  max_epochs: 150
  weight_decay: 0.0
  grad_clip: 5.0
  cosine_lr: true             # cosine 退火
  seeds: [0, 1, 2, 3, 4]      # 5 种子均值±std
  device: cuda

paths:
  checkpoints: results/checkpoints
  logs: logs
  eval: results
  figures: results/figures
  interpret: results/interpret
  ablation: results/ablation
