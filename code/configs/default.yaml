# 主方法默认超参 —— 天气区制感知可学习软门控异质多专家光伏日前预测
# 消融开关直通对应变体（见 configs/ablation/）；只覆盖相关项即可。

seed: 0

data:
  raw_dir: dataset
  processed_dir: data/processed
  look_back: 192                    # 回看 2 天（96点/天 × 2）
  horizon: 96                       # 日前 1 天（15min × 96）
  split: [0.7, 0.1, 0.2]
  stations: [station00, station01, station02, station03, station04,
             station05, station06, station07, station08, station09]

fcm:                                # 模块 A：FCM 软天气区制
  K: 3                              # 区制数（消融 G 扫 2-5）
  m: 2.0                            # 模糊度 η
  feature_cols: [nwp_globalirrad, nwp_temperature, nwp_humidity]
  error: 0.005
  maxiter: 1000

vmd:                                # 仅消融 H（全序列 VMD 泄漏演示）使用
  K_modes: 5
  alpha: 2000
  tau: 0.0
  DC: 0
  init: 1
  tol: 1.0e-7

model:                              # 可学习软门控异质 MoE
  expert_types: [local_conv, dilated_tcn, direct_mlp]
  expert_hidden: 128
  short_window: 48
  gate_mode: soft                   # soft（默认）/ hard（消融 B）
  learnable_gate: true              # true（默认）/ false（消融 C：固定 FCM 隶属）
  gate_hidden: 64
  single_expert: false              # 消融 E（K=1 单专家）
  irrad_anchor: false               # 辐照锚定物理头（消融 I 负结果对照）
  leak_vmd: false                   # 消融 H（全序列 VMD 泄漏演示）

loss:
  huber_delta: 0.0                  # >0 用 Huber，0=MSE

train:
  lr: 3.0e-3
  batch_size: 64
  patience: 20
  max_epochs: 150
  weight_decay: 0.0
  grad_clip: 5.0
  cosine_lr: true
  seeds: [0, 1, 2, 3, 4]
  device: cuda

paths:
  checkpoints: results/checkpoints
  logs: logs
  eval: results
  figures: results/figures
  interpret: results/interpret
  ablation: results/ablation
